<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: rgb(219,224,241);
}

video {
  position: absolute;
  object-fit: contain;
  opacity: 0.85; /* Slightly more transparent when resting */
  
  /* 1. This line makes the animation smooth and bouncy */
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  cursor: pointer; /* Changes mouse to a clicking hand on PC */
}

/* 2. This controls what happens when touched/hovered */
video:hover {
  transform: scale(1.25); /* The "Pop" - makes it 25% bigger */
  z-index: 100 !important; /* The "!important" forces it to the very top layer */
  opacity: 1; /* Makes it 100% solid/clear */
}
</style>
</head>
<body>

<script>
const videos = [
  { src: "video1.mp4", type: "portrait", scale: 0.6 },
  { src: "video2.mp4", type: "portrait", scale: 0.7 },
  { src: "video3.mp4", type: "portrait", scale: 0.8 },
  { src: "video4.mp4", type: "portrait", scale: 1.0 },
  { src: "video5.mp4", type: "portrait", scale: 0.7 },
  { src: "video6.mp4", type: "portrait", scale: 0.8 },
  { src: "video7.mp4", type: "landscape", scale: 1.0 },
  { src: "video8.mp4", type: "landscape", scale: 0.5 },
  { src: "video9.mp4", type: "landscape", scale: 0.4 },
  { src: "video10.mp4", type: "landscape", scale: 0.3 }
];

const globalBaseScale = 1.0; 
const safeMargin = 4; 

videos.forEach((vidData) => {
  const vid = document.createElement("video");
  vid.src = vidData.src;
  vid.autoplay = true;
  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;

  let baseWidthVW = vidData.type === "portrait" ? 10 : 16;
  
  let finalWidth = baseWidthVW * vidData.scale * globalBaseScale;
  vid.style.width = finalWidth + "vw";

  let maxLeft = 100 - finalWidth - safeMargin; 
  let maxTop = 100 - 35 - safeMargin; 

  let randomLeft = safeMargin + (Math.random() * (maxLeft - safeMargin));
  let randomTop = safeMargin + (Math.random() * (maxTop - safeMargin));

  vid.style.left = randomLeft + "vw";
  vid.style.top = randomTop + "vh";
  
  vid.style.zIndex = Math.floor(Math.random() * 20);

  document.body.appendChild(vid);
});
</script>

</body>
</html>
