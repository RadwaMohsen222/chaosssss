<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  width: 100vw;  
  height: 100vh; 
  overflow: hidden;
  background: rgb(219,224,241);
}

video {
  position: absolute;
  object-fit: contain;
  opacity: 0.85; 
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  cursor: pointer;
}

video:hover {
  transform: scale(1.25); 
  z-index: 100 !important; 
  opacity: 1; 
}
</style>
</head>
<body>

<script>
const videos = [
  { src: "video1.mp4", type: "portrait", scale: 2.0 },
  { src: "video2.mp4", type: "portrait", scale: 2.4 },
  { src: "video3.mp4", type: "portrait", scale: 1.6 },
  { src: "video4.mp4", type: "portrait", scale: 3.0 },
  { src: "video5.mp4", type: "portrait", scale: 2.0 },
  { src: "video6.mp4", type: "portrait", scale: 2.2 },
  { src: "video7.mp4", type: "landscape", scale: 1.0 },
  { src: "video8.mp4", type: "landscape", scale: 1.3 },
  { src: "video9.mp4", type: "landscape", scale: 0.9 },
  { src: "video10.mp4", type: "landscape", scale: 0.8 }
];

// --- SMART MOBILE DETECTION ---
// This checks if the screen is narrower than 768px (standard mobile width)
const isMobile = window.innerWidth < 768;

// If on mobile, make videos 3.5x bigger! If on PC, keep them standard.
const globalBaseScale = isMobile ? 1.8 : 1.0; 

// If on mobile, use 2 columns and 5 rows. If on PC, use 5 columns and 2 rows.
const cols = isMobile ? 2 : 5; 
const rows = isMobile ? 5 : 2; 

const paddingLeft = 2;   
const paddingRight = 2;  
const paddingTop = 2;    
const paddingBottom = 2; 
// ------------------------------

videos.forEach((vidData, index) => {
  const vid = document.createElement("video");
  vid.src = vidData.src;
  vid.autoplay = true;
  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;

  let baseWidthVW = vidData.type === "portrait" ? 10 : 16;
  let finalWidth = baseWidthVW * vidData.scale * globalBaseScale;
  vid.style.width = finalWidth + "vw";

  let cellWidthVW = 100 / cols; 
  let cellHeightVH = 100 / rows; 

  let col = index % cols;
  let row = Math.floor(index / cols);

  // Math.max(0, ...) ensures the wiggle room NEVER drops below zero, 
  // which prevents the "locked in place" bug you saw on mobile!
  let assumedHeightVH = isMobile ? 15 : 35; 
  let maxOffsetX = Math.max(0, cellWidthVW - finalWidth); 
  let maxOffsetY = Math.max(0, cellHeightVH - assumedHeightVH); 

  let randomLeft = (col * cellWidthVW) + (Math.random() * maxOffsetX);
  let randomTop = (row * cellHeightVH) + (Math.random() * maxOffsetY);

  if (randomLeft < paddingLeft) randomLeft = paddingLeft;
  if (randomLeft > 100 - paddingRight - finalWidth) randomLeft = 100 - paddingRight - finalWidth;
  if (randomTop < paddingTop) randomTop = paddingTop;
  if (randomTop > 100 - paddingBottom - assumedHeightVH) randomTop = 100 - paddingBottom - assumedHeightVH;

  vid.style.left = randomLeft + "vw";
  vid.style.top = randomTop + "vh";
  
  vid.style.zIndex = Math.floor(Math.random() * 20);

  document.body.appendChild(vid);
});
</script>

</body>
</html>
