<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: rgb(219,224,241);
}

video {
  position: absolute;
  object-fit: contain;
  opacity: 0.85; 
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  cursor: pointer;
}

video:hover {
  transform: scale(1.25); 
  z-index: 100 !important; 
  opacity: 1; 
}
</style>
</head>
<body>

<script>
const videos = [
  { src: "video1.mp4", type: "portrait", scale: 1.0 },
  { src: "video2.mp4", type: "portrait", scale: 1.2 },
  { src: "video3.mp4", type: "portrait", scale: 0.8 },
  { src: "video4.mp4", type: "portrait", scale: 1.5 },
  { src: "video5.mp4", type: "portrait", scale: 1.0 },
  { src: "video6.mp4", type: "portrait", scale: 1.1 },
  { src: "video7.mp4", type: "landscape", scale: 1.0 },
  { src: "video8.mp4", type: "landscape", scale: 0.7 },
  { src: "video9.mp4", type: "landscape", scale: 0.5 },
  { src: "video10.mp4", type: "landscape", scale: 0.4 }
];

const globalBaseScale = 1.0; 

// --- THE INVISIBLE FRAME SETTINGS ---
// Adjust these numbers to make the "thick borders" bigger or smaller. 
// These are in percentages (vw/vh). For example, 20 means 20% of the screen.
const paddingLeft = 20;   // Keeps videos 20% away from the left edge
const paddingRight = 20;  // Keeps videos 20% away from the right edge
const paddingTop = 15;    // Keeps videos 15% away from the top edge
const paddingBottom = 15; // Keeps videos 15% away from the bottom edge
// ------------------------------------

videos.forEach((vidData) => {
  const vid = document.createElement("video");
  vid.src = vidData.src;
  vid.autoplay = true;
  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;

  let baseWidthVW = vidData.type === "portrait" ? 10 : 16;
  
  let finalWidth = baseWidthVW * vidData.scale * globalBaseScale;
  vid.style.width = finalWidth + "vw";

  // Calculate the actual safe zone width and height
  // We subtract the video's size so the *right/bottom edges* don't cross the boundary
  let maxAllowedLeft = (100 - paddingRight) - finalWidth; 
  let maxAllowedTop = (100 - paddingBottom) - 30; // Assuming ~30vh as max video height

  // Generate random positions strictly within the padded zone
  let randomLeft = paddingLeft + (Math.random() * (maxAllowedLeft - paddingLeft));
  let randomTop = paddingTop + (Math.random() * (maxAllowedTop - paddingTop));

  vid.style.left = randomLeft + "vw";
  vid.style.top = randomTop + "vh";
  
  vid.style.zIndex = Math.floor(Math.random() * 20);

  document.body.appendChild(vid);
});
</script>

</body>
</html>
