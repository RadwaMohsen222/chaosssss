<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: rgb(219,224,241);
}

video {
  position: absolute;
  object-fit: cover;
  opacity: 0.9;
}
</style>
</head>
<body>

<script>
const videos = [
  "video1.mp4",
  "video2.mp4",
  "video3.mp4",
  "video4.mp4",
  "video5.mp4",
  "video6.mp4",
  "video7.mp4",
  "video8.mp4",
  "video9.mp4",
  "video10.mp4"
];

videos.forEach((src, index) => {
  const vid = document.createElement("video");
  vid.src = src;
  vid.autoplay = true;
  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;

  // Portrait videos (1–6)
  if (index < 6) {
    vid.style.width = (15 + Math.random() * 15) + "vw"; 
  } 
  // Landscape videos (7–10)
  else {
    vid.style.width = (25 + Math.random() * 20) + "vw";
  }

  vid.style.top = Math.random() * 85 + "%";
  vid.style.left = Math.random() * 85 + "%";
  vid.style.zIndex = Math.floor(Math.random() * 20);

  document.body.appendChild(vid);
});
</script>

</body>
</html>
